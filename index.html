<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wakala Point | System Management</title>
    <!-- CSS za nje -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="wakala.css">
</head>
<body>

    <!-- Header ya Dashboard -->
    <header>
        <nav>
            <h1>Wakala Point</h1>
            <ul id="nav-links">
                <li><a href="#">Nyumbani</a></li>
                <li><a href="#">Maombi</a></li>
                <li><a href="#">Profile</a></li>
            </ul>
        </nav>
    </header>

    <!-- Content ya Dashboard -->
    <main id="app-root">
        <section id="dashboard">
            <h2>Karibu, Steward Jackson Njiwa</h2>
            <div id="stats-container">
                <!-- Hapa data za maombi zitaonekana -->
                <p>Inapakia takwimu zako...</p>
                <div class="spinner"></div>
            </div>
        </section>
    </main>

    <!-- Chat Button ya Support -->
    <button id="chat-fab" class="fab" onclick="toggleChat()">
        💬 Chat na Support
    </button>

    <!-- Chat Box (Itaonekana ikibonyezwa) -->
    <div id="chat-box" class="chat-box">
        <div class="chat-header">Support</div>
        <div id="messages-container"></div>
        <input type="text" id="msg-input" placeholder="Andika ujumbe...">
        <button onclick="sendChatMessage()">Tuma</button>
    </div>

    <!-- Firebase SDKs na App Logic -->
    <script type="module" src="wakala.js"></script>
    <script>
        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
