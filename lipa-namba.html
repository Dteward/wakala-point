<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <title>Omba Lipa Namba — Wakala Point</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="icons-alipay.css">
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="wakala.css">
</head>

<body class="bg_surface_color">

<div class="preload preload-container">
  <div class="preload-logo"><div class="spinner"></div></div>
</div>

<div class="header is-fixed">
  <div class="tf-container">
    <div class="tf-statusbar justify-content-center">
      <a href="index.html" class="back-btn"><i class="icon-left"></i></a>
      <h3>Omba Lipa Namba</h3>
    </div>
  </div>
</div>

<div id="app-wrap" style="padding-top:72px;padding-bottom:76px;">
<div class="tf-container" style="padding:16px;">

<!-- INFO -->
<div class="alert-info-box" style="display:flex;gap:8px;align-items:flex-start;">
  <i class="icon-info" style="flex-shrink:0;margin-top:2px;"></i>
  <span><strong>Lipa Namba</strong> ni namba ya kipekee ya kupokea malipo ya biashara.</span>
</div>

<!-- ================== NEW STEP SELECTOR ================== -->
<div id="step-1" style="margin-top:15px;">
  <p class="section-title">Chagua Aina ya Lipa Namba</p>

  <button class="tf-btn accent large" onclick="showMtandao()">Lipa Namba ya Mtandao</button>
  <button class="tf-btn accent large" onclick="showTill()">Till Namba</button>
</div>

<!-- MTANDAO -->
<div id="step-mtandao" style="display:none;margin-top:10px;">
  <p class="section-title">Chagua Mtandao</p>

  <button class="tf-btn" onclick="setPackage('Airtel',0)">Airtel - Bure</button>
  <button class="tf-btn" onclick="setPackage('Tigo/Yas',0)">Tigo/Yas - Bure</button>
  <button class="tf-btn" onclick="setPackage('Vodacom',0)">Vodacom - Bure</button>
  <button class="tf-btn" onclick="setPackage('Azam Pesa',5000)">Azam Pesa - 5000</button>
  <button class="tf-btn" onclick="setPackage('Halotel',5000)">Halotel - 5000</button>
</div>

<!-- TILL -->
<div id="step-till" style="display:none;margin-top:10px;">
  <p class="section-title">Chagua Till Aina</p>

  <button class="tf-btn" onclick="setPackage('Till Airtel',3000)">Till Airtel - 3000</button>
  <button class="tf-btn" onclick="setPackage('Till Halotel',10000)">Till Halotel - 10000</button>
  <button class="tf-btn" onclick="setPackage('Till Vodacom',30000)">Till Vodacom - 30000</button>
  <button class="tf-btn" onclick="setPackage('Azam Pesa Till',10000)">Azam Pesa - 10000</button>
</div>

<hr class="divider">

<!-- ================= FORM YAKO YA ZAMANI (HAIJABADILIKA) ================= -->

<div style="background:#fff;border-radius:16px;padding:20px;box-shadow:var(--wakala-shadow);">

<p class="section-title">Taarifa za Mwombaji</p>

<div class="group-input">
<label>Jina Kamili *</label>
<input type="text" id="f-jina">
</div>

<div class="group-input">
<label>Namba ya Simu *</label>
<input type="tel" id="f-simu">
</div>

<div class="group-input">
<label>Namba ya Simu ya Pili</label>
<input type="tel" id="f-simu2">
</div>

<div class="group-input">
<label>Aina ya Kitambulisho *</label>
<select id="f-id-type">
<option value="">-- Chagua --</option>
<option>NIDA</option>
<option>Passport</option>
<option>Leseni</option>
<option>Voter ID</option>
</select>
</div>

<div class="group-input">
<label>Namba ya Kitambulisho *</label>
<input type="text" id="f-id-no">
</div>

<hr class="divider">

<p class="section-title">Taarifa za Biashara</p>

<div class="group-input">
<label>Jina la Biashara *</label>
<input type="text" id="f-biz-name">
</div>

<div class="group-input">
<label>Aina ya Biashara *</label>
<select id="f-biz-type">
<option value="">-- Chagua --</option>
<option>Duka</option>
<option>Salon</option>
<option>Mgahawa</option>
<option>Nyingine</option>
</select>
</div>

<div class="group-input">
<label>BRELA / TRA</label>
<input type="text" id="f-reg-no">
</div>

<hr class="divider">

<p class="section-title">Mahali</p>

<div class="group-input">
<label>Mkoa *</label>
<select id="f-mkoa">
<option>Dar es Salaam</option>
<option>Mwanza</option>
<option>Arusha</option>
<option>Mbeya</option>
</select>
</div>

<div class="group-input">
<label>Wilaya *</label>
<input type="text" id="f-wilaya">
</div>

<div class="group-input">
<label>Kata *</label>
<input type="text" id="f-kata">
</div>

<div class="group-input">
<label>Mtandao *</label>
<select id="f-mtandao">
<option>Airtel</option>
<option>Vodacom</option>
<option>Tigo</option>
<option>Halotel</option>
</select>
</div>

<hr class="divider">

<div class="group-input">
<label>Maelezo</label>
<textarea id="f-notes"></textarea>
</div>

<p id="err-msg" style="color:red;display:none;"></p>

<button class="tf-btn accent large" onclick="submitLipaNamba()">
Tuma Ombi
</button>

</div>

</div>
</div>

<script type="module" src="firebase-init.js"></script>
<script src="jquery.min.js"></script>
<script src="wakala.js"></script>
<script src="main.js"></script>
<script src="sidebar.js"></script>

<script>

document.addEventListener('DOMContentLoaded', function () {
  requireAuth();
});

// STEP CONTROL
function showMtandao() {
  document.getElementById('step-1').style.display = 'none';
  document.getElementById('step-till').style.display = 'none';
  document.getElementById('step-mtandao').style.display = 'block';
}

function showTill() {
  document.getElementById('step-1').style.display = 'none';
  document.getElementById('step-mtandao').style.display = 'none';
  document.getElementById('step-till').style.display = 'block';
}

function setPackage(name, price) {
  localStorage.setItem("lipa_package", name);
  localStorage.setItem("lipa_price", price);

  alert("Umechagua: " + name + " - " + price);

  document.getElementById('step-mtandao').style.display = 'none';
  document.getElementById('step-till').style.display = 'none';
}

// SUBMIT FORM (YAKO HAJABADILISHWA)
async function submitLipaNamba() {

  const f = (id) => document.getElementById(id).value.trim();
  const err = document.getElementById('err-msg');

  const required = [
    'f-jina','f-simu','f-id-type','f-id-no',
    'f-biz-name','f-biz-type','f-mkoa','f-wilaya','f-kata','f-mtandao'
  ];

  for (let id of required) {
    if (!f(id)) {
      err.style.display = 'block';
      err.textContent = "Jaza sehemu zote muhimu";
      return;
    }
  }

  const details = {
    jina: f('f-jina'),
    simu: f('f-simu'),
    simu2: f('f-simu2'),
    aina_id: f('f-id-type'),
    namba_id: f('f-id-no'),
    jina_biashara: f('f-biz-name'),
    aina_biashara: f('f-biz-type'),
    namba_ya_biashara: f('f-reg-no'),
    mkoa: f('f-mkoa'),
    wilaya: f('f-wilaya'),
    kata: f('f-kata'),
    mtandao: f('f-mtandao'),
    maelezo: f('f-notes'),
    package: localStorage.getItem("lipa_package"),
    price: localStorage.getItem("lipa_price")
  };

  try {
    const req = await submitRequest('lipa-namba', details);
    window.location.href = `ombi-detail.html?id=${req.id}&new=1`;
  } catch (e) {
    err.style.display = 'block';
    err.textContent = "Hitilafu imetokea";
  }
}

</script>

</body>
</html>
